<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder Offer</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:#fff;
overflow-x:hidden;
}

/* ---------- Product ---------- */

.product-image{
width:140px;
margin-top:20px;
}

.mrp-text{
margin-top:5px;
font-size:18px;
font-weight:bold;
color:red;
-webkit-text-stroke:1px black;
}

.offer-text{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
}

/* ---------- Notification ---------- */

.notification{
position:fixed;
top:10px;
right:10px;
background:#fff;
padding:8px 15px;
border-radius:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-size:14px;
white-space:nowrap;
z-index:9999;
transform:translateX(120%);
animation:slideCorner 3s ease forwards;
}

.notification .name{
color:green;
font-weight:bold;
}

@keyframes slideCorner{
0%{transform:translateX(120%);}
20%{transform:translateX(0);}
80%{transform:translateX(0);}
100%{transform:translateX(120%);}
}

/* ---------- Scratch ---------- */

.scratch-section{
margin-top:40px;
}

.card-title{
font-size:22px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
margin-bottom:10px;
}

.card-container{
position:relative;
width:320px;
height:180px;
margin:auto;
border:5px solid red;
border-radius:15px;
overflow:hidden;
}

.real-card{
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.discount-text{
color:yellow;
font-size:25px;
font-weight:bold;
}

canvas{
position:absolute;
top:0;
left:0;
}

.message{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:black;
}

.order-btn{
margin-top:15px;
padding:14px 35px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
border:2px solid black;
border-radius:10px;
cursor:pointer;
display:none;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* ---------- Second Page ---------- */

.second-page{
display:none;
background:#fff;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;
z-index:10000;
padding:15px;
box-sizing:border-box;
}

/* ---------- XCV PAGE ---------- */

.xcv-page{
display:none;
background:#f5f5f5;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow-y:auto;
z-index:11000;
padding:20px;
box-sizing:border-box;
}

.xcv-title{
font-size:24px;
font-weight:bold;
margin-top:40px;
color:darkgreen;
}

/* YouTube */

.video-frame{
width:100%;
max-width:100%;
margin:0 auto;
border:4px solid blue;
border-radius:8px;
overflow:hidden;
box-sizing:border-box;
}

.video-wrapper{
position:relative;
width:100%;
padding-top:56.25%;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.benefit-title{
margin-top:25px;
font-size:22px;
font-weight:bold;
color:black;
background:yellow;
display:inline-block;
padding:8px 20px;
border:3px solid red;
}

.benefit-list{
margin-top:20px;
text-align:left;
max-width:600px;
margin-left:auto;
margin-right:auto;
font-size:17px;
line-height:1.8;
font-weight:500;
}

.benefit-list li{
margin-bottom:10px;
}

.second-order-btn{
margin-top:40px;
margin-bottom:40px;
padding:15px 40px;
background:green;
color:white;
font-size:20px;
font-weight:bold;
border:3px solid black;
border-radius:10px;
cursor:pointer;
animation:pulse 1s infinite;
}
</style>
</head>

<body>

<img src="image.png" class="product-image">
<div class="mrp-text">MRP-900TK</div>

<div class="offer-text">
রমজান উপলক্ষে Methi Mixd powder এ বিশেষ ডিসকাউন্ট!
</div>

<!-- Scratch Section (ORIGINAL RESTORED) -->

<div class="scratch-section">
<div class="card-title">লাকি স্ক্র্যাচ কার্ড</div>

<div class="card-container">
<div class="real-card">
<div class="discount-text" id="discountText"></div>
</div>
<canvas id="scratchCanvas"></canvas>
</div>

<div class="message" id="messageBox"></div>
<button class="order-btn" id="orderBtn" onclick="openSecondPage()">অর্ডার করতে চাই</button>
</div>

<!-- Second Page -->
<div class="second-page" id="secondPage">

<div class="video-frame">
<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
</div>
</div>

<div class="benefit-title">৭ দিন সেবনের উপকারিতা</div>

<ul class="benefit-list">
<li>✔ ৭ দিন সেবনে কোষ্ঠকাঠিন্যের সম্পূর্ণ উপশম</li>
<li>✔ ৭ দিন সেবনে গ্যাস্ট্রিক সমস্যার কার্যকর সমাধান</li>
<li>✔ বুক জ্বালাপোড়া নিয়ন্ত্রণ</li>
</ul>

<button class="second-order-btn" onclick="openXcvPage()">অর্ডার করবো</button>

</div>

<!-- XCV Section -->
<div class="xcv-page" id="xcvPage">
<div class="xcv-title">xcv</div>
<p>এটি আপনার নতুন সেকশন</p>
</div>

<script>

/* XCV OPEN */
function openXcvPage(){
document.getElementById("xcvPage").style.display="block";
}

/* Second Page */
function openSecondPage(){
document.getElementById("secondPage").style.display="block";
}

/* Scratch System ORIGINAL */

const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
const container=document.querySelector(".card-container");

canvas.width=container.offsetWidth;
canvas.height=container.offsetHeight;

const originalPrice=900;
const discount=Math.floor(Math.random()*(50-25+1))+25;
const finalPrice=Math.round(originalPrice-(originalPrice*discount/100));

document.getElementById("discountText").innerText=discount+"% ডিসকাউন্ট";

ctx.fillStyle="gray";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="bold 22px Arial";
ctx.textAlign="center";
ctx.fillText("এখানে ঘষুন",canvas.width/2,canvas.height/2);

ctx.globalCompositeOperation="destination-out";

let isDrawing=false;
let scratched=false;

function scratch(e){
if(!isDrawing) return;
const rect=canvas.getBoundingClientRect();
const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",finishScratch);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",finishScratch);
canvas.addEventListener("touchmove",scratch);

function finishScratch(){
if(scratched) return;
scratched=true;
isDrawing=false;

const message="অভিনন্দন! আপনি "+discount+"% ডিসকাউন্ট পেয়েছেন। নতুন দাম "+finalPrice+" টাকা।";

document.getElementById("messageBox").innerText=message;
document.getElementById("orderBtn").style.display="inline-block";
}

</script>

</body>
</html>
