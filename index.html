<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder Offer</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:#fff;
}

.offer-text{
margin-top:30px;
font-size:20px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
}

.scratch-section{
margin-top:40px;
}

.card-title{
font-size:22px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
margin-bottom:10px;
}

.card-container{
position:relative;
width:320px;
height:180px;
margin:auto;
border:5px solid red;
border-radius:15px;
overflow:hidden;
}

.real-card{
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.discount-text{
color:yellow;
font-size:25px;
font-weight:bold;
}

canvas{
position:absolute;
top:0;
left:0;
}
</style>
</head>

<body>

<div class="offer-text">
রমজান উপলক্ষে Methi Mixd powder এ বিশেষ ডিসকাউন্ট!
</div>

<div class="scratch-section">
<div class="card-title">লাকি স্ক্র্যাচ কার্ড</div>

<div class="card-container">
<div class="real-card">
<div class="discount-text" id="discountText"></div>
</div>
<canvas id="scratchCanvas"></canvas>
</div>
</div>

<script>
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
const container=document.querySelector(".card-container");

canvas.width=container.offsetWidth;
canvas.height=container.offsetHeight;

const discount=Math.floor(Math.random()*(50-25+1))+25;
document.getElementById("discountText").innerText=discount+"% ডিসকাউন্ট";

ctx.fillStyle="gray";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="bold 22px Arial";
ctx.textAlign="center";
ctx.fillText("এখানে ঘষুন",canvas.width/2,canvas.height/2);

ctx.globalCompositeOperation="destination-out";

let isDrawing=false;
let voicePlayed=false;

function scratch(e){
if(!isDrawing) return;
const rect=canvas.getBoundingClientRect();
const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",finishScratch);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",finishScratch);
canvas.addEventListener("touchmove",scratch);

function finishScratch(){
isDrawing=false;

if(voicePlayed) return; // একবারই প্লে হবে
voicePlayed=true;

/* 🔊 অটো ভয়েস যোগ করা হয়েছে */
if ('speechSynthesis' in window) {

function playVoice(){
window.speechSynthesis.cancel();

const speech=new SpeechSynthesisUtterance("অভিনন্দন আপনার ডিসকাউন্ট টি একটিভ হয়ে গেছে");
speech.lang="bn-BD";
speech.volume=1;   // Full volume
speech.rate=0.9;
speech.pitch=1;

window.speechSynthesis.speak(speech);
}

if(speechSynthesis.getVoices().length===0){
speechSynthesis.onvoiceschanged=playVoice;
}else{
playVoice();
}

}

}
</script>

</body>
</html>
