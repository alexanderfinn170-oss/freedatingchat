<!-- ================= LUCKY WHEEL SECTION ================= -->

<style>
.wheel-container{
    margin-top:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    position:relative;
}

#wheel{
    width:320px;
    height:320px;
    border-radius:50%;
    border:12px solid gold;
    box-shadow:0 0 20px rgba(0,0,0,0.4);
    position:relative;
    overflow:hidden;
    transition: transform 5s cubic-bezier(0.33, 1, 0.68, 1);
    background:#111;
}

.bolt{
    width:14px;
    height:14px;
    background:silver;
    border-radius:50%;
    position:absolute;
    box-shadow: inset 0 0 3px #000;
}

.pointer{
    width:0;
    height:0;
    border-left:15px solid transparent;
    border-right:15px solid transparent;
    border-bottom:30px solid red;
    position:absolute;
    top:-28px;
    left:50%;
    transform:translateX(-50%);
}

.spin-btn{
    margin-top:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff, #ccc);
    border:6px solid gold;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

@media(max-width:480px){
    #wheel{
        width:280px;
        height:280px;
    }
}
</style>

<div class="wheel-container">
    <div class="pointer"></div>
    <canvas id="wheel"></canvas>
    <button class="spin-btn" onclick="spinWheel()">SPIN</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const size = 320;
canvas.width = size;
canvas.height = size;

const segments = [];
for(let i=20;i<=60;i++){
    segments.push(i + "% OFF🔥");
}

const totalSegments = segments.length;
const arc = (2 * Math.PI) / totalSegments;
let rotation = 0;
let spinning = false;

function drawWheel(){
    for(let i=0;i<totalSegments;i++){
        const angle = i * arc;
        ctx.beginPath();
        ctx.fillStyle = i % 2 === 0 ? "#222" : "#444";
        ctx.moveTo(size/2, size/2);
        ctx.arc(size/2, size/2, size/2, angle, angle+arc);
        ctx.fill();
        ctx.save();
        ctx.translate(size/2, size/2);
        ctx.rotate(angle + arc/2);
        ctx.fillStyle = "white";
        ctx.font = "bold 12px Arial";
        ctx.fillText(segments[i], size/4, 5);
        ctx.restore();
    }

    // Golden center circle
    ctx.beginPath();
    ctx.arc(size/2, size/2, 40, 0, 2*Math.PI);
    ctx.fillStyle="gold";
    ctx.fill();
}

drawWheel();

function spinWheel(){
    if(spinning) return;
    spinning = true;

    // Only stop between 25% - 49%
    const stopValue = Math.floor(Math.random() * (49 - 25 + 1)) + 25;
    const index = stopValue - 20;

    const stopAngle = (totalSegments - index) * arc;
    const extraSpins = 10 * 2 * Math.PI;
    rotation = extraSpins + stopAngle;

    canvas.style.transition = "transform 5s cubic-bezier(0.33, 1, 0.68, 1)";
    canvas.style.transform = "rotate(" + rotation + "rad)";

    setTimeout(()=>{
        spinning = false;
        alert("🎉 Congratulations! You got " + stopValue + "% OFF🔥");
    },5000);
}

// Metallic bolts
const wheelContainer = document.querySelector(".wheel-container");
for(let i=0;i<8;i++){
    const bolt = document.createElement("div");
    bolt.className="bolt";
    const angle = (i/8)*2*Math.PI;
    bolt.style.left = 160 + 150*Math.cos(angle) + "px";
    bolt.style.top = 160 + 150*Math.sin(angle) + "px";
    wheelContainer.appendChild(bolt);
}
</script>

<!-- ================= END LUCKY WHEEL ================= -->
