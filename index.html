<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder Offer</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#4b0082;
    font-family: Arial, sans-serif;
    text-align:center;
    overflow-x:hidden;
}

/* Live Notification */
.live-notification{
    position:fixed;
    top:15px;
    right:-350px;
    background:rgba(0,0,0,0.8);
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    font-size:12px;
    font-weight:600;
    box-shadow:0 4px 15px rgba(0,0,0,0.4);
    z-index:9999;
    max-width:220px;
    transition:right 0.6s ease, opacity 0.4s ease;
    opacity:0;
}
.live-notification.show{
    right:15px;
    opacity:1;
}

.outline-text{
    color:#ffffff;
    font-weight:bold;
    -webkit-text-stroke: 0.6px black;
}
.product-name{
    color:#ff2d2d;
    -webkit-text-stroke:0.6px black;
    font-weight:bold;
}

.product-wrapper{
    width:100%;
    position:relative;
    height:200px;
    overflow:hidden;
}
.product-img{
    width:230px;
    position:absolute;
    bottom:0;
    animation: moveLeftRight 6s ease-in-out infinite alternate;
}
@keyframes moveLeftRight{
    0%{ left:10%; }
    100%{ left:55%; }
}

.offer-box{
    margin:0 auto 15px auto;
    width:90%;
    max-width:500px;
    padding:15px;
    background:#4b0082;
    border:2px solid yellow;
    border-radius:10px;
}

.big-text{
    font-size:22px;
    margin:10px 0;
}

.scratch-container{
    position:relative;
    width:340px;
    height:240px;
    margin:10px auto;
}

#scratchCanvas{
    position:absolute;
    top:0;
    left:0;
    cursor:pointer;
    border-radius:15px;
    border:2px solid yellow;
    touch-action:none;
}

.scratch-content{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:10px;
    box-sizing:border-box;
}
.scratch-content img{
    width:120px;
    margin-bottom:10px;
}

.result-text{
    margin-top:15px;
    font-size:20px;
}

.order-btn{
    display:none;
    margin:15px auto;
    width:80%;
    max-width:350px;
    padding:14px;
    font-size:18px;
    font-weight:bold;
    color:white;
    border:2px solid white;
    border-radius:40px;
    cursor:pointer;
    background: linear-gradient(45deg, red, orange, yellow, green, blue, purple);
    background-size: 400% 400%;
    animation: rainbowMove 4s linear infinite, bounce 1.5s infinite;
}
@keyframes rainbowMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

/* ORDER FORM */
.order-section{
    display:none;
    margin:30px auto;
    width:90%;
    max-width:500px;
    background:#fff;
    padding:20px;
    border-radius:10px;
}
.order-section input{
    width:100%;
    padding:10px;
    margin:8px 0;
    font-size:16px;
}
.submit-btn{
    width:100%;
    padding:12px;
    background:green;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="liveNotification" class="live-notification"></div>

<div class="product-wrapper">
    <img id="mainProduct" src="YOUR_IMAGE_LINK_HERE" class="product-img">
</div>

<div class="offer-box outline-text">
আমাদের <span class="product-name">Methi Mixd powder</span> 999tk রমজান উপলক্ষে লাকি কুপন দিচ্ছি। স্ক্র্যাচ করে ১০%–৫০% ডিসকাউন্ট পান।
</div>

<div class="big-text outline-text">
স্ক্র্যাচ করে <span class="product-name">Methi Mixd powder</span> এর ডিসকাউন্ট নিন!
</div>

<div class="scratch-container">
    <div class="scratch-content outline-text">
        <img id="cardProduct">
        <div id="discountText"></div>
    </div>
    <canvas id="scratchCanvas" width="340" height="240"></canvas>
</div>

<div class="result-text outline-text" id="finalResult"></div>

<button class="order-btn" id="orderBtn">
ডিসকাউন্ট অর্ডার করতে চাই
</button>

<!-- ORDER SECTION -->
<div class="order-section" id="orderSection">
    <h2>অর্ডার ফর্ম</h2>
    <input type="text" placeholder="আপনার নাম">
    <input type="tel" placeholder="মোবাইল নাম্বার">
    <input type="text" placeholder="ঠিকানা">
    <button class="submit-btn">অর্ডার কনফার্ম করুন</button>
</div>

<script>

/* Notification */
const names=["মাহমুদুল","সুমাইয়া","রাকিব","তাসনিম","সোহেল","নুসরাত","আরিফ","মিম"];
let notificationIndex=0;
const notificationBox=document.getElementById("liveNotification");

function showNotification(){
if(notificationIndex>=names.length){notificationIndex=0;}
let randomDiscount=Math.floor(Math.random()*16)+10;
notificationBox.innerHTML=
names[notificationIndex]+" "+randomDiscount+
"% ডিসকাউন্ট পেয়েছে 🎉";
notificationBox.classList.add("show");
setTimeout(()=>{notificationBox.classList.remove("show");},2500);
notificationIndex++;
}
setTimeout(()=>{showNotification();setInterval(showNotification,3000);},3000);

/* Scratch */
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
let scratching=false;
let discount=Math.floor(Math.random()*21)+30;
let originalPrice=999;
let discountedPrice=Math.round(originalPrice-(originalPrice*discount/100));
const mainImage=document.getElementById("mainProduct");
const cardImage=document.getElementById("cardProduct");
cardImage.src=mainImage.src;
document.getElementById("discountText").innerHTML=
"আপনি পেয়েছেন "+discount+"% ডিসকাউন্ট";

function drawScratchLayer(){
ctx.fillStyle="gold";
ctx.fillRect(0,0,340,240);
ctx.fillStyle="red";
ctx.font="bold 22px Arial";
ctx.textAlign="center";
ctx.fillText("এখানে ঘষুন",170,130);
}
drawScratchLayer();

function getPosition(e){
const rect=canvas.getBoundingClientRect();
return{
x:(e.touches?e.touches[0].clientX:e.clientX)-rect.left,
y:(e.touches?e.touches[0].clientY:e.clientY)-rect.top
}}
function scratch(e){
if(!scratching)return;
let pos=getPosition(e);
ctx.globalCompositeOperation="destination-out";
ctx.beginPath();
ctx.arc(pos.x,pos.y,22,0,Math.PI*2);
ctx.fill();
}
canvas.addEventListener("mousedown",()=>scratching=true);
canvas.addEventListener("mouseup",showResult);
canvas.addEventListener("mousemove",scratch);
canvas.addEventListener("touchstart",()=>scratching=true);
canvas.addEventListener("touchend",showResult);
canvas.addEventListener("touchmove",scratch);

function showResult(){
scratching=false;
document.getElementById("finalResult").innerHTML=
discount+"% ডিসকাউন্টের পর দাম "+discountedPrice+" টাকা";
document.getElementById("orderBtn").style.display="block";
}

document.getElementById("orderBtn").onclick=function(){
document.getElementById("orderSection").style.display="block";
document.getElementById("orderSection").scrollIntoView({behavior:"smooth"});
};

</script>

</body>
</html>
<div class="hadis-text">
রাসূলুল্লাহ (সা.) বলেছেন, "আমার উম্মতরা যদি জানত মেথিতে কি উপকার আছে তবে তারা সোনার বদলে হলেও এটা কিনে খেত"
</div>
