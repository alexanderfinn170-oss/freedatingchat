<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">

<!-- Disable Zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Methi Mixd Powder Offer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    overflow-x:hidden;
    touch-action:manipulation;
    font-family: Arial, sans-serif;
    background:#6a0dad;
    text-align:center;
}

/* Top Product Image */
.top-image{
    width:220px;
    margin-top:20px;
    position:relative;
    z-index:2;
}

/* Offer Box */
.offer-box{
    border:4px solid yellow;
    width:90%;
    max-width:500px;
    margin:-20px auto 0;
    padding:20px 15px;
    border-radius:15px;
    position:relative;
    z-index:1;
}

/* Main Text */
.offer-text{
    color:white;
    font-size:18px;
    font-weight:bold;
    line-height:1.5;
    -webkit-text-stroke:1px black;
}

/* Product Name */
.product-name{
    color:red;
    font-size:26px;
    font-weight:bold;
    -webkit-text-stroke:2px yellow;
}

/* Bottom Text */
.bottom-text{
    margin-top:20px;
    padding:0 15px;
    color:white;
    font-size:17px;
    font-weight:bold;
    line-height:1.6;
    -webkit-text-stroke:1px black;
}

/* MRP Highlight */
.mrp{
    color:red;
    -webkit-text-stroke:1px black;
}
</style>

</head>
<body>

<!-- Main Top Image -->
<img src="image.png" alt="Product" class="top-image">

<!-- Offer Box -->
<div class="offer-box">
    <div class="offer-text">
        সবাইকে আসসালামু আলাইকুম, রামাদান উপলক্ষে 
        <span class="product-name">
            Methi Mixd powder
        </span>
        আমাদের সবচেয়ে হট প্রোডাক্টে ২০% থেকে ৬০% ডিসকাউন্ট দেওয়া হচ্ছে, 
        আর ডিসকাউন্ট টি পাচ্ছেন লাকি স্পিনের মাধ্যমে.
    </div>
</div>

<!-- Bottom Text -->
<div class="bottom-text">
    অফারটি শুধু রমজান মাস উপলক্ষে. 
    প্রোডাক্টটির আসল প্রাইস 
    <span class="mrp">MRP-৯০০৳</span>. 
    লাকি স্পিন ক্লিক করে আপনার ডিসকাউন্ট নিন.
</div>

</body>
</html>
