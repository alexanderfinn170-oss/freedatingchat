<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Methi Mixd Powder Offer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow-x:hidden;
    touch-action:manipulation;
    font-family: Arial, sans-serif;
    background:#ffffff;
    text-align:center;
}

/* ===== Top Section ===== */
.top-image{
    width:220px;
    margin-top:20px;
}

.offer-box{
    border:4px solid yellow;
    width:90%;
    max-width:500px;
    margin:-20px auto 0;
    padding:20px 15px;
    border-radius:15px;
}

.offer-text{
    color:black;
    font-size:18px;
    font-weight:bold;
    line-height:1.5;
    -webkit-text-stroke:1px darkgreen;
}

.product-name{
    color:black;
    font-size:26px;
    font-weight:bold;
    -webkit-text-stroke:2px darkgreen;
}

.bottom-text{
    margin-top:20px;
    padding:0 15px;
    color:black;
    font-size:17px;
    font-weight:bold;
    line-height:1.6;
    -webkit-text-stroke:1px darkgreen;
}

.mrp{
    color:black;
    -webkit-text-stroke:1px darkgreen;
}

/* ================= SCRATCH CARD ================= */

.scratch-section{
    margin-top:40px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.card-title{
    font-size:20px;
    font-weight:bold;
    margin-bottom:5px;
    color:black;
    -webkit-text-stroke:1px darkgreen;
}

.card-container{
    position:relative;
    width:320px;
    height:180px;
    border:6px solid red;
    border-radius:15px;
    overflow:hidden;
}

/* Bottom Real Card */
.real-card{
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:10px;
}

.discount-text{
    font-size:20px;
    font-weight:bold;
    color:yellow;
    -webkit-text-stroke:1px black;
}

/* Scratch Canvas */
#scratchCanvas{
    position:absolute;
    top:0;
    left:0;
}

.message{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
    color:black;
}

@media(max-width:480px){
    .card-container{
        width:280px;
        height:160px;
    }
}
</style>
</head>

<body>

<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAN-w08Gb55AD8HEwmiDiC_crYJ_EN0BLQfqn9gYgKKKnTMDMNog1PIwrfBNYyi4D6iMxbdwI6zNJzyaAtxSuwed3bzEoLBwe58VZ6EWFRwgtIRsqQlQdEYf9wHpjw_u9NtNcXgibLxJgu633h6Bf46fvpmBxP_Xm2aHSwPjZ2LjojMFIYAXkKhhzsg5o/s612/WhatsApp_Image_2026-02-24_at_12.56.43-removebg-preview.png" class="top-image">

<div class="offer-box">
    <div class="offer-text">
        সবাইকে আসসালামু আলাইকুম, রামাদান উপলক্ষে 
        <span class="product-name">Methi Mixd powder</span>
        আমাদের সবচেয়ে হট প্রোডাক্টে ২০% থেকে ৬০% ডিসকাউন্ট দেওয়া হচ্ছে।
    </div>
</div>

<div class="bottom-text">
    অফারটি শুধু রমজান মাস উপলক্ষে. 
    প্রোডাক্টটির আসল প্রাইস 
    <span class="mrp">MRP-৯০০৳</span>. 
    স্ক্র্যাচ করে আপনার ডিসকাউন্ট নিন.
</div>

<!-- ===== Scratch Card ===== -->

<div class="scratch-section">
    <div class="card-title">লাকি স্ক্র্যাচ কার্ড</div>

    <div class="card-container">
        <div class="real-card">
            <div class="discount-text" id="discountText"></div>
        </div>
        <canvas id="scratchCanvas"></canvas>
    </div>

    <div class="message" id="messageBox"></div>
</div>

<script>
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");
const container = document.querySelector(".card-container");

canvas.width = container.offsetWidth;
canvas.height = container.offsetHeight;

const originalPrice = 900;

// Random discount 25-49
const discount = Math.floor(Math.random() * (49 - 25 + 1)) + 25;
const finalPrice = originalPrice - (originalPrice * discount / 100);

document.getElementById("discountText").innerText =
discount + "% ডিসকাউন্ট";

// Rainbow Gradient
const gradient = ctx.createLinearGradient(0,0,canvas.width,canvas.height);
gradient.addColorStop(0,"red");
gradient.addColorStop(0.17,"orange");
gradient.addColorStop(0.34,"yellow");
gradient.addColorStop(0.51,"green");
gradient.addColorStop(0.68,"blue");
gradient.addColorStop(0.85,"indigo");
gradient.addColorStop(1,"violet");

ctx.fillStyle = gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

// "এখানে ঘষুন" লেখা
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "white";
ctx.font = "bold 22px Arial";
ctx.textAlign = "center";
ctx.fillText("এখানে ঘষুন", canvas.width/2, canvas.height/2);

ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;

function scratch(e){
    if(!isDrawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    ctx.beginPath();
    ctx.arc(x,y,20,0,Math.PI*2);
    ctx.fill();
}

canvas.addEventListener("mousedown",()=> isDrawing=true);
canvas.addEventListener("mouseup",finishScratch);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=> isDrawing=true);
canvas.addEventListener("touchend",finishScratch);
canvas.addEventListener("touchmove",scratch);

function finishScratch(){
    isDrawing=false;
    document.getElementById("messageBox").innerText =
    "অভিনন্দন! আপনি "+discount+"% ডিসকাউন্ট পেয়েছেন। "+
    "Methi Mixd powder এর নতুন দাম "+finalPrice.toFixed(0)+"৳";
}
</script>

</body>
</html>
