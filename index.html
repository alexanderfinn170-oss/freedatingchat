<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#fff;
text-align:center;
overflow-x:hidden;
}

.section{
display:none;
padding:20px;
}

.active{
display:block;
}

button{
padding:12px 25px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.primary-btn{
background:#e60000;
color:#fff;
}

.wheel-container{
position:relative;
width:300px;
height:300px;
margin:20px auto;
}

#wheel{
width:100%;
height:100%;
border-radius:50%;
border:8px solid #222;
transition:transform 4s ease-out;
}

.spin-btn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#ffcc00;
color:#000;
font-weight:bold;
border-radius:50%;
width:90px;
height:90px;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.1);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.result-box{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:green;
}
</style>
</head>

<body>

<!-- STEP 1 -->
<div id="step1" class="section active">
<h2>Methi Mixd Powder</h2>
<p>পুরুষদের সকল গোপন সমস্যার হারবাল সমাধান</p>
<p>✔️ শক্তি বৃদ্ধি</p>
<p>✔️ স্ট্যামিনা বৃদ্ধি</p>
<p>✔️ দ্রুত ফলাফল</p>
<h3>মূল্য: ৯০০ টাকা</h3>
<button class="primary-btn" onclick="nextStep(1)">অর্ডার করতে চাই</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="section">
<h2>ভাগ্য যাচাই করে নিন এবং জিতে নিন আকর্ষণীয় ডিসকাউন্ট</h2>

<div class="wheel-container">
<canvas id="wheel" width="300" height="300"></canvas>
<button class="spin-btn" onclick="spinWheel()">ট্রাই লাক</button>
</div>

<div id="result" class="result-box"></div>
<div id="afterWin"></div>
</div>

<!-- STEP 3 -->
<div id="step3" class="section">
<h2>পেমেন্ট ডিটেলস</h2>
<p>বিকাশ / নগদ: 01XXXXXXXXX</p>
<p>পেমেন্ট করে স্ক্রিনশট পাঠান</p>
</div>

<!-- AUDIO FILES -->
<audio id="spinSound" src="spin.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script>

function nextStep(current){
document.getElementById("step"+current).classList.remove("active");
document.getElementById("step"+(current+1)).classList.add("active");
}

/* ---------- Wheel Drawing ---------- */

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const segments = ["10%","20%","30%","40%","50%","60%","70%","80%","FREE"];
const colors = ["#f44336","#9c27b0","#3f51b5","#03a9f4","#4caf50","#ff9800","#795548","#607d8b","#000"];

const originalPrice = 900;

function drawWheel(){
let angle = 2 * Math.PI / segments.length;
for(let i=0;i<segments.length;i++){
ctx.beginPath();
ctx.moveTo(150,150);
ctx.arc(150,150,150,i*angle,(i+1)*angle);
ctx.fillStyle = colors[i];
ctx.fill();
ctx.save();
ctx.translate(150,150);
ctx.rotate(i*angle + angle/2);
ctx.fillStyle="#fff";
ctx.font="bold 14px Arial";
ctx.fillText(segments[i],50,5);
ctx.restore();
}
}
drawWheel();

/* ---------- Spin Logic ---------- */

let spinning = false;

function speak(text){
const speech = new SpeechSynthesisUtterance(text);
speech.lang = "en-US";
speech.rate = 1;
speech.pitch = 1;
window.speechSynthesis.speak(speech);
}

function spinWheel(){

if(spinning) return;
spinning = true;

const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

spinSound.currentTime = 0;
spinSound.play();

const allowedWins = [30,40,50,60];
let winPercent = allowedWins[Math.floor(Math.random()*allowedWins.length)];

let index = segments.indexOf(winPercent+"%");
let anglePerSegment = 360 / segments.length;
let rotateTo = (360*5) + (360 - index * anglePerSegment - anglePerSegment/2);

canvas.style.transform = "rotate("+rotateTo+"deg)";

setTimeout(function(){

spinSound.pause();
spinSound.currentTime = 0;

winSound.play();

let discountAmount = (originalPrice * winPercent)/100;
let finalPrice = originalPrice - discountAmount;

document.getElementById("result").innerHTML =
"অভিনন্দন! আপনি "+winPercent+"% ডিসকাউন্ট জিতেছেন<br>আপনার জন্য মূল্য: "+finalPrice+" টাকা";

document.getElementById("afterWin").innerHTML =
'<br><button class="primary-btn" onclick="nextStep(2)">অর্ডার করতে চাই</button>';

// Voice Announcement
speak("Congratulations! You win "+winPercent+" percent discount");

spinning = false;

},4000);

}

</script>

</body>
</html>
