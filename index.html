<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder Offer</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:#fff;
overflow-x:hidden;
}

/* PRODUCT */

.product-image{width:140px;margin-top:20px;}
.mrp-text{margin-top:5px;font-size:18px;font-weight:bold;color:red;-webkit-text-stroke:1px black;}
.offer-text{margin-top:20px;font-size:20px;font-weight:bold;color:black;-webkit-text-stroke:1px darkgreen;}

/* NOTIFICATION */

.notification{
position:fixed;
top:10px;
right:10px;
background:#fff;
padding:8px 15px;
border-radius:20px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
font-size:14px;
z-index:9999;
animation:slide 3s ease forwards;
}

.notification .name{color:green;font-weight:bold;}

@keyframes slide{
0%{transform:translateX(120%);}
20%{transform:translateX(0);}
80%{transform:translateX(0);}
100%{transform:translateX(120%);}
}

/* SCRATCH */

.scratch-section{margin-top:40px;}
.card-container{position:relative;width:320px;height:180px;margin:auto;border:5px solid red;border-radius:15px;overflow:hidden;}
.real-card{width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;}
.discount-text{color:yellow;font-size:25px;font-weight:bold;}
canvas{position:absolute;top:0;left:0;}
.order-btn{margin-top:15px;padding:14px 35px;background:red;color:white;font-size:18px;font-weight:bold;border:2px solid black;border-radius:10px;cursor:pointer;display:none;animation:pulse 1s infinite;}
@keyframes pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}

/* SECOND PAGE */

.second-page{display:none;background:#fff;position:fixed;top:0;left:0;width:100%;height:100%;overflow-y:auto;z-index:10000;padding:15px;box-sizing:border-box;}
.cod-highlight{margin-top:40px;margin-bottom:20px;display:inline-block;background:yellow;padding:12px 25px;font-size:20px;font-weight:bold;color:black;-webkit-text-stroke:1px green;}

/* ORDER SECTION */

.auto-product-img{width:160px;margin-top:20px;}
.confirm-text{margin-top:15px;font-size:18px;font-weight:bold;color:black;-webkit-text-stroke:1px green;background:red;display:inline-block;padding:5px 15px;}
.order-template{background:white;margin:25px auto;padding:20px;max-width:400px;border:2px solid yellow;outline:2px solid black;border-radius:10px;}
.template-title{text-align:center;font-weight:bold;font-size:20px;color:black;-webkit-text-stroke:1px green;margin-bottom:15px;}
.qty-box{display:flex;justify-content:center;align-items:center;gap:15px;margin:10px 0;}
.qty-btn{font-size:22px;font-weight:bold;padding:5px 15px;background:yellow;color:red;border:2px solid black;outline:1px solid green;cursor:pointer;}
.total-text{margin-top:10px;font-weight:bold;color:black;-webkit-text-stroke:1px green;}
.input-red,.input-black{width:100%;padding:8px;margin-top:8px;}
.input-red{border:1px solid red;}
.input-black{border:1px solid black;}
.submit-btn{margin-top:15px;padding:12px;width:100%;background:blue;color:white;font-weight:bold;border:2px solid black;cursor:pointer;animation:btnMove 1.2s infinite;}
@keyframes btnMove{0%{transform:translateY(0);}50%{transform:translateY(-3px);}100%{transform:translateY(0);}}
.success-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:green;color:white;padding:10px 20px;border-radius:20px;display:none;}

/* LIVE REVIEW */

.lr-tab{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
background:red;
color:white;
padding:12px 8px;
font-weight:bold;
cursor:pointer;
border-radius:10px 0 0 10px;
z-index:20000;
display:none;
}

.lr-box{
position:fixed;
right:-320px;
top:50%;
transform:translateY(-50%);
width:300px;
height:450px;
background:#fff;
border-radius:20px;
box-shadow:0 0 15px rgba(0,0,0,0.3);
z-index:21000;
display:flex;
flex-direction:column;
transition:0.4s;
}

.lr-box.active{right:10px;}
.lr-header{background:black;color:white;padding:10px;border-radius:20px 20px 0 0;}
.lr-messages{flex:1;overflow-y:auto;padding:10px;font-size:13px;text-align:left;}
.lr-msg{margin-bottom:10px;}
.lr-name{font-weight:bold;color:green;}
.lr-input{display:flex;border-top:1px solid #ddd;}
.lr-input input{flex:1;padding:8px;border:none;}
.lr-input button{background:red;color:white;border:none;padding:8px;cursor:pointer;}
</style>
</head>

<body>

<img src="image.png" class="product-image">
<div class="mrp-text">MRP-900TK</div>
<div class="offer-text">রমজান উপলক্ষে বিশেষ ডিসকাউন্ট!</div>

<div class="scratch-section">
<div class="card-container">
<div class="real-card">
<div class="discount-text" id="discountText"></div>
</div>
<canvas id="scratchCanvas"></canvas>
</div>
<button class="order-btn" id="orderBtn" onclick="openSecondPage()">অর্ডার করতে চাই</button>
</div>

<div class="second-page" id="secondPage">
<div class="cod-highlight">পুরো বাংলাদেশ ক্যাশ অন ডেলিভারি ১২০৳ 🚛</div>

<img src="image.png" class="auto-product-img">
<div class="confirm-text">নিচে আপনার অর্ডারটি ডিসকাউন্টসহ কনফার্ম করুন</div>

<div class="order-template">
<div class="template-title">Discount & Details</div>
<div id="showDiscount"></div>
<div id="showPrice"></div>

<div class="qty-box">
<button class="qty-btn" onclick="changeQty(-1)">-</button>
<div id="qty">1</div>
<button class="qty-btn" onclick="changeQty(1)">+</button>
</div>

<div class="total-text">মোট দাম : <span id="totalPrice"></span> টাকা</div>

<input class="input-red" id="discField" disabled>
<input class="input-red" id="priceField" disabled>

<input class="input-black" placeholder="* নাম লিখুন">
<input class="input-black" placeholder="* নাম্বার লিখুন">
<input class="input-black" placeholder="* ঠিকানা লিখুন">

<button class="submit-btn" onclick="submitOrder()">Submit Order</button>
</div>
</div>

<div class="success-bar" id="successBar">আপনার অর্ডারটি সাবমিট হয়ে গেছে</div>

<div class="lr-tab" id="lrTab">Live Reviews</div>

<div class="lr-box" id="lrBox">
<div class="lr-header">লাইভ রিভিউ</div>
<div class="lr-messages" id="lrMessages"></div>
<div class="lr-input">
<input type="text" id="lrInput" placeholder="রিভিউ লিখুন">
<button onclick="sendLR()">Send</button>
</div>
</div>

<script>

/* NOTIFICATION */
const names=["তানভীর","মাহি","রাকিব","সাবিনা","আরিফ","নাসরিন"];
function showNotification(){
const name=names[Math.floor(Math.random()*names.length)];
const discount=Math.floor(Math.random()*20)+10;
const div=document.createElement("div");
div.className="notification";
div.innerHTML=`<span class="name">${name}</span> 🎉 ${discount}% ডিসকাউন্টে অর্ডার করেছে`;
document.body.appendChild(div);
setTimeout(()=>{div.remove();},3000);
}
setInterval(showNotification,4000);

/* SCRATCH */
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
canvas.width=320;canvas.height=180;

const originalPrice=900;
const discount=Math.floor(Math.random()*(50-25+1))+25;
const finalPrice=Math.round(originalPrice-(originalPrice*discount/100));

document.getElementById("discountText").innerText=discount+"% ডিসকাউন্ট";

ctx.fillStyle="gray";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.globalCompositeOperation="destination-out";

let isDrawing=false;
canvas.onmousedown=()=>isDrawing=true;
canvas.onmouseup=finishScratch;
canvas.onmousemove=e=>{
if(!isDrawing)return;
ctx.beginPath();
ctx.arc(e.offsetX,e.offsetY,20,0,Math.PI*2);
ctx.fill();
};

function finishScratch(){
isDrawing=false;
document.getElementById("orderBtn").style.display="inline-block";
updateDisplay();
}

/* ORDER SYSTEM */
let quantity=1;

function updateDisplay(){
let total=finalPrice*quantity;
document.getElementById("qty").innerText=quantity;
document.getElementById("totalPrice").innerText=total;
document.getElementById("showDiscount").innerText="ডিসকাউন্ট: "+discount+"%";
document.getElementById("showPrice").innerText="এক পণ্যের দাম: "+finalPrice+" টাকা";
document.getElementById("discField").value="ডিসকাউন্ট: "+discount+"%";
document.getElementById("priceField").value="মোট দাম: "+total+" টাকা";
}

function changeQty(val){
quantity+=val;
if(quantity<1)quantity=1;
updateDisplay();
}

function submitOrder(){
document.getElementById("successBar").style.display="block";
setTimeout(()=>{document.getElementById("successBar").style.display="none";},3000);
}

/* SECOND PAGE */
function openSecondPage(){
document.getElementById("secondPage").style.display="block";
document.getElementById("lrTab").style.display="block";
}

/* LIVE REVIEW */
const lrTab=document.getElementById("lrTab");
const lrBox=document.getElementById("lrBox");
lrTab.onclick=()=>lrBox.classList.add("active");

function sendLR(){
const val=document.getElementById("lrInput").value;
if(!val)return;
const msg=document.createElement("div");
msg.className="lr-msg";
msg.innerHTML="<span class='lr-name'>আপনি</span>: "+val;
document.getElementById("lrMessages").appendChild(msg);
document.getElementById("lrInput").value="";
}

setInterval(()=>{
const fake=["৭ দিনে ভালো ফল","গ্যাস্ট্রিক কমেছে","পেট পরিষ্কার হচ্ছে"];
const msg=document.createElement("div");
msg.className="lr-msg";
msg.innerHTML="<span class='lr-name'>কাস্টমার</span>: "+fake[Math.floor(Math.random()*fake.length)];
document.getElementById("lrMessages").appendChild(msg);
},4000);

</script>

</body>
</html>
