<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Methi Mixd Powder Offer</title>

<style>
body{
margin:0;
font-family:Arial;
text-align:center;
background:#fff;
}

.product-image{
width:140px;
margin-top:20px;
}

/* 🔥 নতুন যোগ করা MRP স্টাইল */
.mrp-text{
margin-top:5px;
font-size:18px;
font-weight:bold;
color:red;
-webkit-text-stroke:1px black;
}

.offer-text{
margin-top:20px;
font-size:20px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
}

.scratch-section{
margin-top:40px;
}

.card-title{
font-size:22px;
font-weight:bold;
color:black;
-webkit-text-stroke:1px darkgreen;
margin-bottom:10px;
}

.card-container{
position:relative;
width:320px;
height:180px;
margin:auto;
border:5px solid red;
border-radius:15px;
overflow:hidden;
}

.real-card{
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

.discount-text{
color:yellow;
font-size:25px;
font-weight:bold;
}

canvas{
position:absolute;
top:0;
left:0;
}

.message{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:black;
}

.order-btn{
margin-top:15px;
padding:14px 35px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
border:2px solid black;
border-radius:10px;
cursor:pointer;
display:none;
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAN-w08Gb55AD8HEwmiDiC_crYJ_EN0BLQfqn9gYgKKKnTMDMNog1PIwrfBNYyi4D6iMxbdwI6zNJzyaAtxSuwed3bzEoLBwe58VZ6EWFRwgtIRsqQlQdEYf9wHpjw_u9NtNcXgibLxJgu633h6Bf46fvpmBxP_Xm2aHSwPjZ2LjojMFIYAXkKhhzsg5o/s612/WhatsApp_Image_2026-02-24_at_12.56.43-removebg-preview.png" class="product-image">

<!-- 🔥 MRP লেখা যুক্ত করা হয়েছে -->
<div class="mrp-text">MRP-900TK</div>

<div class="offer-text">
রমজান উপলক্ষে Methi Mixd powder এ বিশেষ ডিসকাউন্ট!
</div>

<div class="scratch-section">
<div class="card-title">লাকি স্ক্র্যাচ কার্ড</div>

<div class="card-container">
<div class="real-card">
<div class="discount-text" id="discountText"></div>
</div>
<canvas id="scratchCanvas"></canvas>
</div>

<div class="message" id="messageBox"></div>
<button class="order-btn" id="orderBtn">অর্ডার করতে চাই</button>
</div>

<script>
const canvas=document.getElementById("scratchCanvas");
const ctx=canvas.getContext("2d");
const container=document.querySelector(".card-container");

canvas.width=container.offsetWidth;
canvas.height=container.offsetHeight;

const originalPrice=900;
const discount=Math.floor(Math.random()*(50-25+1))+25;
const finalPrice=Math.round(originalPrice-(originalPrice*discount/100));

document.getElementById("discountText").innerText=discount+"% ডিসকাউন্ট";

ctx.fillStyle="gray";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.font="bold 22px Arial";
ctx.textAlign="center";
ctx.fillText("এখানে ঘষুন",canvas.width/2,canvas.height/2);

ctx.globalCompositeOperation="destination-out";

let isDrawing=false;
let scratched=false;

function scratch(e){
if(!isDrawing) return;
const rect=canvas.getBoundingClientRect();
const x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
const y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
ctx.beginPath();
ctx.arc(x,y,20,0,Math.PI*2);
ctx.fill();
}

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",finishScratch);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",finishScratch);
canvas.addEventListener("touchmove",scratch);

function finishScratch(){
if(scratched) return;
scratched=true;
isDrawing=false;

const message="অভিনন্দন! আপনি "+discount+"% ডিসকাউন্ট পেয়েছেন। Methi Mixd powder এর নতুন দাম "+finalPrice+" টাকা।";

document.getElementById("messageBox").innerText=message;
document.getElementById("orderBtn").style.display="inline-block";
}
</script>

</body>
</html>
