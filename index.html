<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
    background-image: url("https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAN-w08Gb55AD8HEwmiDiC_crYJ_EN0BLQfqn9gYgKKKnTMDMNog1PIwrfBNYyi4D6iMxbdwI6zNJzyaAtxSuwed3bzEoLBwe58VZ6EWFRwgtIRsqQlQdEYf9wHpjw_u9NtNcXgibLxJgu633h6Bf46fvpmBxP_Xm2aHSwPjZ2LjojMFIYAXkKhhzsg5o/s612/WhatsApp_Image_2026-02-24_at_12.56.43-removebg-preview.png"); /* ← প্রোডাক্টের মেইন ছবি */
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Overlay for better text visibility */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.5);
}

/* Content Box */
.content-box{
    position:relative;
    max-width:600px;
    width:90%;
    padding:40px;
    text-align:center;
    background: rgba(0,0,0,0.5); /* বক্স ও ব্যাকগ্রাউন্ড একই টোন */
    border:2px solid yellow;
    color:#fff;
    z-index:1;
}

.content-box h1{
    font-size:32px;
    margin-bottom:15px;
}

.content-box p{
    font-size:18px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="content-box">
    <h1>আপনার প্রোডাক্টের আকর্ষণীয় হেডলাইন</h1>
    <p>এখানে আপনার প্রোডাক্টের ছোট কিন্তু শক্তিশালী বিবরণ লিখুন যা কাস্টমারকে কিনতে আগ্রহী করবে।</p>
</div>

</body>
</html>
