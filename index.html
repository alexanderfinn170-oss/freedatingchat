<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Methi Mixd Powder Offer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    overflow-x:hidden;
    touch-action:manipulation;
    font-family: Arial, sans-serif;
    background:#ffffff;
    text-align:center;
}

/* ===== Top Product Image ===== */
.top-image{
    width:220px;
    margin-top:20px;
}

/* ===== Offer Box ===== */
.offer-box{
    border:4px solid yellow;
    width:90%;
    max-width:500px;
    margin:-20px auto 0;
    padding:20px 15px;
    border-radius:15px;
}

.offer-text{
    color:white;
    font-size:18px;
    font-weight:bold;
    line-height:1.5;
    -webkit-text-stroke:1px black;
}

.product-name{
    color:red;
    font-size:26px;
    font-weight:bold;
    -webkit-text-stroke:2px yellow;
}

/* ===== Bottom Text ===== */
.bottom-text{
    margin-top:20px;
    padding:0 15px;
    color:white;
    font-size:17px;
    font-weight:bold;
    line-height:1.6;
    -webkit-text-stroke:1px black;
}

.mrp{
    color:red;
    -webkit-text-stroke:1px black;
}

/* ================= WHEEL SECTION ================= */

.wheel-section{
    margin-top:40px;
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#wheel{
    width:320px;
    height:320px;
    border-radius:50%;
    border:12px solid gold;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
    transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* Pointer */
.pointer{
    width:0;
    height:0;
    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-bottom:35px solid red;
    position:absolute;
    top:-30px;
}

/* Spin Button */
.spin-btn{
    margin-top:25px;
    padding:15px 35px;
    font-size:18px;
    font-weight:bold;
    background:gold;
    border:none;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

@media(max-width:480px){
    #wheel{
        width:280px;
        height:280px;
    }
}
</style>
</head>

<body>

<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgAN-w08Gb55AD8HEwmiDiC_crYJ_EN0BLQfqn9gYgKKKnTMDMNog1PIwrfBNYyi4D6iMxbdwI6zNJzyaAtxSuwed3bzEoLBwe58VZ6EWFRwgtIRsqQlQdEYf9wHpjw_u9NtNcXgibLxJgu633h6Bf46fvpmBxP_Xm2aHSwPjZ2LjojMFIYAXkKhhzsg5o/s612/WhatsApp_Image_2026-02-24_at_12.56.43-removebg-preview.png" class="top-image">

<div class="offer-box">
    <div class="offer-text">
        সবাইকে আসসালামু আলাইকুম, রামাদান উপলক্ষে 
        <span class="product-name">Methi Mixd powder</span>
        আমাদের সবচেয়ে হট প্রোডাক্টে ২০% থেকে ৬০% ডিসকাউন্ট দেওয়া হচ্ছে, 
        আর ডিসকাউন্ট টি পাচ্ছেন লাকি স্পিনের মাধ্যমে.
    </div>
</div>

<div class="bottom-text">
    অফারটি শুধু রমজান মাস উপলক্ষে. 
    প্রোডাক্টটির আসল প্রাইস 
    <span class="mrp">MRP-৯০০৳</span>. 
    লাকি স্পিন ক্লিক করে আপনার ডিসকাউন্ট নিন.
</div>

<!-- ===== Lucky Wheel ===== -->

<div class="wheel-section">
    <div class="pointer"></div>
    <canvas id="wheel"></canvas>
    <button class="spin-btn" onclick="spinWheel()">SPIN NOW</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const size = 320;
canvas.width = size;
canvas.height = size;

const segments = ["20%","30%","40%","50%","60%"];
const total = segments.length;
const arc = (2*Math.PI)/total;
let rotation = 0;
let spinning = false;

function drawWheel(){
    for(let i=0;i<total;i++){
        const angle = i*arc;
        ctx.beginPath();
        ctx.fillStyle = i%2===0 ? "#222" : "#444";
        ctx.moveTo(size/2,size/2);
        ctx.arc(size/2,size/2,size/2,angle,angle+arc);
        ctx.fill();

        ctx.save();
        ctx.translate(size/2,size/2);
        ctx.rotate(angle+arc/2);
        ctx.fillStyle="white";
        ctx.font="bold 20px Arial";
        ctx.fillText(segments[i], size/4, 10);
        ctx.restore();
    }
}
drawWheel();

function spinWheel(){
    if(spinning) return;
    spinning=true;

    // Only 30% - 50%
    const possibleStops = [1,2,3]; // index for 30%,40%,50%
    const randomIndex = possibleStops[Math.floor(Math.random()*possibleStops.length)];

    const stopAngle = (total - randomIndex)*arc;
    const spins = 8 * 2*Math.PI; // fast spin
    rotation = spins + stopAngle;

    canvas.style.transform="rotate("+rotation+"rad)";

    setTimeout(()=>{
        spinning=false;
        alert("🎉 অভিনন্দন! আপনি পেয়েছেন "+segments[randomIndex]+" ডিসকাউন্ট!");
    },4000);
}
</script>

</body>
</html>
